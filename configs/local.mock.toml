[location]
latitude = -17.10211
longitude = -56.94487
country = "BRA"
admin1_region = "BR-MT"
timezone = "America/Cuiaba"

[storage]
root = ".local_run/usb"
fallback_root = ".local_run/fallback"
state_root = ".local_run/state"
work_root = ".local_run/work"
